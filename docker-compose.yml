services:
  web:
    build: .
    container_name: ai_visibility_api
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: >
      sh -c "flask --app run.py db upgrade &&
             gunicorn -b 0.0.0.0:5000 run:app"

  db:
    image: postgres:16-alpine
    container_name: ai_visibility_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: